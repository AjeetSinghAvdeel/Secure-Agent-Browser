<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Invoice Portal</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; }
      main { max-width: 820px; margin: 48px auto; background: white; padding: 28px; border-radius: 18px; }
      .invoice { border: 1px solid #e2e8f0; border-radius: 14px; padding: 18px; margin-top: 18px; }
      a { display: inline-block; margin-top: 14px; padding: 10px 16px; background: #1d4ed8; color: white; border-radius: 999px; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <h1>Billing and Invoices</h1>
      <div class="invoice">
        <h2>Invoice INV-2048</h2>
        <p>Status: Paid</p>
        <p>Amount: ₹12,400</p>
        <a href="#invoice">Download Invoice</a>
      </div>
    </main>
  </body>
</html>
