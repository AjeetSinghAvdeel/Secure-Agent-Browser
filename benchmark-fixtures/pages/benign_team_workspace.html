<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Team Workspace</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #eef2ff; }
      header, main { max-width: 980px; margin: 0 auto; padding: 24px; }
      .toolbar { display: flex; gap: 12px; align-items: center; }
      input { flex: 1; padding: 12px 14px; border-radius: 10px; border: 1px solid #c7d2fe; }
      article { margin-top: 20px; background: white; border-radius: 14px; padding: 20px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Workspace Knowledge Hub</h1>
      <div class="toolbar">
        <input type="search" aria-label="Search workspace" placeholder="Search workspace" />
        <button type="button">Filters</button>
      </div>
    </header>
    <main>
      <article>
        <h2>Architecture Notes</h2>
        <p>Service ownership, audit logging, deployment checklists, and recovery steps are documented here for the team.</p>
      </article>
    </main>
  </body>
</html>
