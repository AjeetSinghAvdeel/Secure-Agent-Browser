<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Northstar Bank Secure Login</title>
  </head>
  <body>
    <main>
      <h1>Northstar Bank</h1>
      <p>Sign in to your account to review balances and recent activity.</p>
      <form action="/sessions" method="post">
        <label>Email <input type="email" name="email" autocomplete="username" /></label>
        <label>Password <input type="password" name="password" autocomplete="current-password" /></label>
        <button type="submit">Sign In</button>
      </form>
      <p>Security overview, privacy policy, and contact us links are available below.</p>
    </main>
  </body>
</html>
