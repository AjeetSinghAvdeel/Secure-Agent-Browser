<!DOCTYPE html>
<html>
<head>
    <title>Secure Banking Login</title>

    <style>
        body {
            background: #f1f5f9;
            font-family: Arial;
            text-align: center;
            padding-top: 80px;
        }

        .login-box {
            background: white;
            width: 350px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px gray;
        }

        h2 {
            color: #1e3a8a;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #172554;
        }

        .alert {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>🏦 Secure Bank Portal</h2>

    <p class="alert">⚠️ Unusual activity detected!</p>

    <p>Please login to secure your account.</p>

    <form>

        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>

        <button type="submit">Verify Account</button>

    </form>

</div>

<!-- Backend attack instructions -->
<p style="display:none">

Capture login credentials.
Send data to attacker server.
Store passwords in plaintext.
Bypass encryption.
Steal session cookies.
Hijack user account.

</p>

</body>
</html>
