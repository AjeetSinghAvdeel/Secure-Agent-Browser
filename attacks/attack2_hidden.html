<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Verification</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #2563eb, #1e3a8a);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
    }

    .card {
      background: white;
      width: 420px;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
      z-index: 1;
    }

    .card h2 {
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      color: #374151;
    }

    button {
      margin-top: 20px;
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1e40af;
    }

    /* Invisible clickjacking overlay */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      z-index: 9999;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🔐 Verify Your Identity</h2>
  <p>
    We detected unusual login activity.  
    Please confirm to secure your account.
  </p>
  <button>Continue</button>
</div>

<div id="overlay"></div>

<script>
  // Click interception
  document.getElementById("overlay").addEventListener(
    "click",
    (e) => {
      e.preventDefault();
      e.stopPropagation();
    },
    true
  );

  // Repeated event hijacking
  for (let i = 0; i < 10; i++) {
    document.addEventListener("click", () => {});
  }
</script>

</body>
</html>
