<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureAgent Security Warning</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090d14;
        --panel: #111827;
        --border: #1f2937;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --warn: #f59e0b;
        --block: #ef4444;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at 20% 20%, #1b2334 0%, var(--bg) 40%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        background: linear-gradient(160deg, rgba(17, 24, 39, 0.95), rgba(9, 13, 20, 0.96));
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 14px 50px rgba(0, 0, 0, 0.45);
      }
      .title {
        margin: 0 0 8px;
        font-size: 1.5rem;
        font-weight: 700;
      }
      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }
      .panel {
        background: rgba(17, 24, 39, 0.85);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }
      .label {
        color: var(--muted);
        font-size: 0.8rem;
        text-transform: uppercase;
      }
      .value {
        font-size: 1.1rem;
        font-weight: 700;
        margin-top: 4px;
      }
      .risk-warn {
        color: var(--warn);
      }
      .risk-block {
        color: var(--block);
      }
      .list {
        margin: 8px 0 0;
        padding-left: 18px;
      }
      .explanation {
        margin-top: 8px;
        line-height: 1.55;
      }
      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }
      #goBack {
        background: #374151;
        color: #fff;
      }
      #proceed {
        background: #2563eb;
        color: #fff;
      }
      #proceed.blocked {
        background: #7f1d1d;
      }
      .url {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.86rem;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 class="title">SecureAgent Security Warning</h1>
      <p class="subtitle">⚠ This page has been blocked</p>
      <p class="subtitle" id="subtitle">This page was flagged before loading.</p>

      <div class="grid">
        <section class="panel">
          <div class="label">Risk Score</div>
          <div class="value" id="risk">0</div>
        </section>
        <section class="panel">
          <div class="label">Threat Indicators</div>
          <ul class="list" id="indicators"></ul>
        </section>
      </div>

      <section class="panel">
        <div class="label">Explanation</div>
        <p class="explanation" id="explanation">No explanation available.</p>
        <p class="url" id="url"></p>
      </section>

      <div class="actions">
        <button id="goBack" type="button">Go Back</button>
        <button id="proceed" type="button">Proceed Anyway</button>
      </div>
    </main>

    <script src="warning.js"></script>
  </body>
</html>
