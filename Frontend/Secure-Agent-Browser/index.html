<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />

    <!-- App Identity -->
    <title>SecureAgent — AI-Powered Web Security Analyzer</title>
    <meta
      name="description"
      content="SecureAgent is an AI-powered browser security system that detects phishing, prompt injection, malicious UI behavior, and runtime threats in real time."
    />
    <meta name="author" content="SecureAgent Team" />

    <!-- Favicon / App Icon -->
    <!-- Use SVG for modern browsers -->
    <link rel="icon" type="image/svg+xml" href="/secureagent.svg" />
    <!-- Fallback ICO -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Apple / PWA Support -->
    <link rel="apple-touch-icon" href="/secureagent.svg" />
    <meta name="apple-mobile-web-app-title" content="SecureAgent" />

    <!-- Fonts (explicit, intentional) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Security Hardening -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
  </head>

  <body class="bg-background text-foreground antialiased">
    <noscript>
      SecureAgent requires JavaScript to run. Please enable JavaScript to continue.
    </noscript>

    <!-- React Root -->
    <div id="root"></div>

    <!-- App Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
